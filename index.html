<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocking Web</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Stocking.web</h1>
    </header>

    <section>
        <div class="all">
            <h2>จำนวนรายการทั้งหมด</h2>
            <h1>0</h1>
        </div>
        <div class="out-of-stock">
            <h2>รายการสินค้าที่หมด</h2>
            <h1>0</h1>
        </div>
        <div class="menu">
            <input class="search-bar" type="text" placeholder="ค้นหาสินค้า">
            <div class="dropdown">
                <button onclick="toggleMenu('myDropdown')" class="dropbtn">หมวดหมู่สินค้า</button>

                <div id="myDropdown" class="dropdown-content">
                    <a href="index.html">วัตถุดิบ</a>
                    <a href="index.html">topping</a>
                </div>
                
                <div class="status-dropdown">
                    <button onclick="toggleMenu('statusDropdownlist')" class="dropbtn">สถานะสินค้า</button>

                    <div id="statusDropdownlist" class="dropdown-content">
                        <a href="index.html">หมด</a>
                        <a href="index.html">มีสินค้า</a>
                    </div>

            </div>

            <ul>
                <li><a href="index.html">จัดหมวดหมู่</a></li>
                <li><a href="index.html">เพิ่มรายการสินค้า</a></li>
            </ul>
        </div>

    </section>
    <div class="product-list">
        <table>
            <thead>
                <tr>
                    <th>ชื่อสินค้า</th>
                    <th>หมวดหมู่</th>
                    <th>จำนวน</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                <!-- Product rows will be dynamically added here -->
            </tbody>
        </table>
</body>
</html>
